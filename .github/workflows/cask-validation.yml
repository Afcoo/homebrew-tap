name: Validate Casks

on:
  push:
    branches:
      - main
    paths:
      - Casks/**
      - .github/workflows/cask-validation.yml
  pull_request:
    paths:
      - Casks/**
      - .github/workflows/cask-validation.yml
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: cask-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: macos-26
    env:
      CASK_LIST_FILE: .casks-to-validate.txt
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Prepare Homebrew test environment
        run: |
          brew test-bot --only-cleanup-before
          brew test-bot --only-setup

      - name: Validate tap syntax
        run: brew test-bot --only-tap-syntax

      - name: Select Casks to validate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail

          validate_all=false
          comparison_base=""

          case "$EVENT_NAME" in
            schedule|workflow_dispatch)
              validate_all=true
              ;;
            pull_request)
              comparison_base="$BASE_SHA"
              ;;
            push)
              comparison_base="$BEFORE_SHA"
              if [[ -z "$comparison_base" || "$comparison_base" =~ ^0+$ ]]; then
                validate_all=true
              fi
              ;;
          esac

          if [[ "$validate_all" == false ]]; then
            if ! git cat-file -e "${comparison_base}^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "$comparison_base"
            fi

            changed_files="$(git diff --name-only "$comparison_base" HEAD -- Casks .github/workflows/cask-validation.yml)"
            if printf '%s\n' "$changed_files" | grep -qx '.github/workflows/cask-validation.yml'; then
              validate_all=true
            fi
          fi

          if [[ "$validate_all" == true ]]; then
            find Casks -type f -name '*.rb' | LC_ALL=C sort > "$CASK_LIST_FILE"
            echo "Selected every Cask for validation."
          else
            changed_file_list="$RUNNER_TEMP/changed-files.txt"
            printf '%s\n' "$changed_files" > "$changed_file_list"
            while IFS= read -r changed_file; do
              if [[ "$changed_file" =~ ^Casks/.+\.rb$ && -f "$changed_file" ]]; then
                printf '%s\n' "$changed_file"
              fi
            done < "$changed_file_list" | LC_ALL=C sort -u > "$CASK_LIST_FILE"
            echo "Selected only changed Casks for validation."
          fi

          if [[ -s "$CASK_LIST_FILE" ]]; then
            sed 's/^/- /' "$CASK_LIST_FILE"
          else
            echo "No Casks require per-release validation."
          fi

      - name: Validate selected Casks
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s "$CASK_LIST_FILE" ]]; then
            echo "No Casks selected; tap syntax validation is sufficient for this change."
            exit 0
          fi

          repository_name="${GITHUB_REPOSITORY#*/}"
          tap_owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          tap_name="${tap_owner}/${repository_name#homebrew-}"

          while IFS= read -r cask_file; do
            token="$(basename "$cask_file" .rb)"
            cask="${tap_name}/${token}"

            echo "::group::Validate ${cask}"
            brew style "$cask"
            brew audit --strict --online --cask "$cask"
            brew livecheck --cask "$cask"
            brew fetch --cask "$cask"
            echo "::endgroup::"
          done < "$CASK_LIST_FILE"

      - name: Report validation failure
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = "Cask validation is failing";
            const { owner, repo } = context.repo;
            const runURL = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              "actions/runs",
              process.env.GITHUB_RUN_ID,
            ].join("/");
            const body = [
              "Cask validation failed.",
              "",
              `- Run: ${runURL}`,
              `- Commit: \`${context.sha}\``,
              `- Event: \`${context.eventName}\``,
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const issue = issues.find(candidate =>
              candidate.title === title && !candidate.pull_request
            );

            if (issue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: issue.number,
                assignees: [owner],
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                assignees: [owner],
              });
            }

      - name: Resolve validation failure notification
        if: success() && github.event_name != 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = "Cask validation is failing";
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const issue = issues.find(candidate =>
              candidate.title === title && !candidate.pull_request
            );

            if (issue) {
              const runURL = [
                process.env.GITHUB_SERVER_URL,
                process.env.GITHUB_REPOSITORY,
                "actions/runs",
                process.env.GITHUB_RUN_ID,
              ].join("/");
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Cask validation recovered: ${runURL}`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
              });
            }
